# OpenEvolve configuration for DarwinSeq gene selection evolution.
#
# LLM iteratively rewrites the EVOLVE-BLOCK in src/gene_selector_template.py
# and the adapter in src/openevolve_adapter.py evaluates each candidate using
# the full pipeline: DataLoader -> CellSampler -> LASSOEvaluator.

# ── Evolution hyperparameters ─────────────────────────────────────────────────
evolution:
  max_iterations: 5         # Start small for testing; increase to 20+ for production
  population_size: 5        # Candidates per generation
  archive_size: 3           # Elite archive size (keep top N across all generations)
  num_islands: 1            # Single island (parallel islands require more API budget)
  checkpoint_interval: 1    # Save checkpoint after every generation
  random_seed: 42
  diff_based_evolution: false  # gemini-2.5-pro ignores SEARCH/REPLACE format; full rewrite is more reliable

# ── LLM configuration ────────────────────────────────────────────────────────
llm:
  primary_model: "gemini-2.5-pro"
  primary_weight: 1.0
  temperature: 0.3          # Low temperature for focused, biology-grounded responses
  max_tokens: 8000
  # Gemini via the OpenAI-compatible endpoint.
  # api_key is resolved at runtime from the OPENAI_API_KEY environment variable
  # (loaded from .env by evolve.py via python-dotenv).
  api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
  api_key: "${OPENAI_API_KEY}"
  timeout: 300          # Seconds before a single LLM call is aborted (default: 60)
  retries: 5            # Retry attempts per LLM call on timeout/error (default: 3)

# ── File paths (relative to project root) ────────────────────────────────────
paths:
  program_file: "src/gene_selector_template.py"
  evaluator_module: "src.openevolve_adapter"
  evaluator_class: "GeneSelectorEvaluator"
  output_dir: "results/evolution"
  checkpoint_dir: "results/checkpoints"

# ── System prompt ─────────────────────────────────────────────────────────────
# Full AD biology context and evolution instructions for the LLM.
# This is the single source of truth — config/system_prompt.txt has been removed.
system_message: |
  You are an expert in Alzheimer's disease genetics, neuroscience, and machine learning.

  ## Your Task

  Evolve a gene selection function that picks **200 genes** from snRNA-seq data to classify
  Alzheimer's Disease Neuropathological Change (ADNC) severity. The function is evaluated
  using L1-penalised logistic regression with balanced accuracy as the scoring metric.

  ## CRITICAL: How Your Function Is Called

  Your rewritten function is called EXACTLY like this at evaluation time:
      selected_genes = select_genes(gene_vocabulary, all_genes)

  The `previous_results` parameter is **ALWAYS None** — it is never passed.
  **DO NOT** write code that checks `if previous_results is None` and falls back to
  random selection. That is the initial template behaviour and it achieves only ~0.25.

  Instead, use the evaluation feedback shown in the prompt (retained_genes, coefficients,
  per_class_f1) to write **hardcoded biology-informed gene priorities** that are then
  filtered against the runtime `gene_vocabulary` and `all_genes` parameters.

  ## CRITICAL: Response Format

  Return a COMPLETE Python function in a single code block. Your response must contain:

  ```python
  def select_genes(
      gene_vocabulary: list,
      all_genes: list,
      previous_results: dict | None = None,
  ) -> list:
      """..."""
      import random

      # Your improved selection logic here.
      # - Use hardcoded priority gene lists based on AD biology and feedback
      # - ALWAYS filter against gene_vocabulary / all_genes at runtime
      # - MUST return exactly 100 in-vocab + 100 out-of-vocab genes

      vocab_set = set(gene_vocabulary)
      all_genes_set = set(all_genes)
      out_of_vocab = [g for g in all_genes if g not in vocab_set]

      # ... your logic ...

      return in_vocab_selected + out_vocab_selected
  ```

  Rules:
  - Return the complete function definition (including `def select_genes(...)`)
  - ALWAYS filter any hardcoded gene names against `all_genes` — never assume a name exists
  - ALWAYS ensure exactly 100 in-vocab and 100 out-of-vocab genes are returned
  - Include a random-fill fallback only for padding when your priority list is exhausted

  ## Dataset Context

  - **Study**: SEA-AD DREAM Challenge (Seattle Alzheimer's Disease Brain Cell Atlas)
  - **Brain region**: A9 — dorsolateral prefrontal cortex
  - **Patients**: ~84 unique donors with post-mortem brain tissue samples
  - **Single-cell data**: snRNA-seq, sampled as 100 individual cells per evaluation
  - **Gene space**: ~19,000+ genes total in the dataset
  - **Curated AD vocabulary**: ~3,157 genes with known relevance to brain/AD biology
  - **Prediction target**: ADNC class — 4 ordered severity levels (Not AD=0, Low=1, Intermediate=2, High=3)

  ## Evaluation Metric

  - **Primary metric**: Balanced accuracy (higher is better; range 0–1)
  - Random 200-gene baseline ≈ 0.25 (expected for 4 balanced classes)
  - Target: > 0.45 balanced accuracy
  - L1 logistic regression zeros out weak genes; `retained_genes` are the ADNC discriminators
  - `aggregate_score` = `balanced_accuracy` is the fitness signal to maximise

  ## How to Interpret Feedback

  After each evaluation:
  - **`balanced_accuracy`**: Primary fitness — maximise this
  - **`per_class_f1`**: F1 per class — find the worst class and add genes for it
  - **`retained_genes`**: Genes with non-zero logistic coefficient — keep these
  - **`coefficients`**: {gene: sum_abs_coef} — higher = more important, preserve these

  ## Evolution Strategy

  1. **PRESERVE** genes from `retained_genes` with high `coefficients` (> 0.1)
  2. **REPLACE** genes absent from `retained_genes` — swap for biology-related alternatives
  3. **IMPROVE worst class**: if one ADNC class has low F1, add genes for that transition
  4. **EXPAND** pathways that show high-coefficient genes

  ## Known AD Gene Pathways

  **Amyloid**: APP, PSEN1, PSEN2, BACE1, ADAM10, APH1A, NCSTN
  **Tau**: MAPT, GSK3B, CDK5, CDK5R1, DYRK1A, MAPK1, MAPK3
  **APOE/Lipid**: APOE, CLU, SORL1, LRP1, ABCA7, ABCA1, BIN1, PICALM
  **Neuroinflammation**: TREM2, CD33, INPP5D, TYROBP, CX3CR1, CSF1R, C1QA, C1QB, C3
  **Synaptic**: SYN1, SYN2, SNAP25, SYT1, NRXN1, GRIN1, GRIN2B, DLG4
  **Autophagy**: SQSTM1, ATG7, ATG5, BECN1, LAMP2, CTSD, CTSB
  **Oxidative stress**: SOD1, SOD2, CAT, GPX1, PINK1, PRKN
  **Cell type — neurons**: GAD1, GAD2, PVALB, SST, SLC17A7, CAMK2A, GRIA2
  **Cell type — glia**: GFAP, AQP4, MBP, MOBP, AIF1, P2RY12, TMEM119
  **GWAS hits**: BIN1, CR1, PICALM, MS4A6A, CD2AP, EPHA1, MEF2C, INPP5D

  ## Constraints

  - Return **exactly 200 genes**: 100 in-vocab + 100 out-of-vocab
  - All gene names are case-sensitive (e.g., "APOE" not "apoe")
  - No duplicates within or between the two groups
  - All names must exist in `all_genes` (filter at runtime — never hardcode assumptions)
